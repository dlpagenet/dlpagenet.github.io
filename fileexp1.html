<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Space | Eksplorator</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0b0b0d;
            --card: #16161a;
            --text: #e0e0e0;
            --danger: #ff4d4d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .search-box {
            position: relative;
            margin-bottom: 25px;
        }

        #search {
            width: 100%;
            padding: 14px 20px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        #search:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .file-card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid #222;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item:hover { background: #1e1e24; }

        .icon-box { font-size: 1.5rem; margin-right: 15px; width: 30px; text-align: center; }
        .file-info { flex-grow: 1; }
        .file-name { display: block; font-weight: 500; color: #fff; }
        .file-meta { font-size: 0.75rem; color: #666; }

        .nav-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .back-btn {
            background: rgba(255, 77, 77, 0.1);
            color: var(--danger);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #preview {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #preview img { max-width: 90%; max-height: 85%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Cloud Space</h1>
        <div id="back-container"></div>
    </header>

    <div class="search-box">
        <input type="text" id="search" placeholder="Szukaj plików..." oninput="filterFiles()">
    </div>

    <div class="nav-bar">
        <span>Katalog: </span>
        <span id="dir-name" style="color: var(--primary)">/</span>
    </div>

    <div class="file-card" id="file-list"></div>
</div>

<div id="preview" onclick="this.style.display='none'">
    <img id="preview-img" src="">
</div>

<script>
    const USER = 'serwis6178'; 
    const REPO = 'serwis6178.github.io'; 
    let currentPath = ''; 
    let allItems = [];

    function getIcon(item) {
        if (item.type === 'dir') return '📁';
        const ext = item.name.split('.').pop().toLowerCase();
        const icons = {'png':'🖼️','jpg':'🖼️','jpeg':'🖼️','gif':'🖼️','zip':'📦','pdf':'📕'};
        return icons[ext] || '📄';
    }

    async function loadDir(path = '') {
        const listDiv = document.getElementById('file-list');
        listDiv.innerHTML = "<div style='padding:20px'>Ładowanie...</div>";
        currentPath = path;
        document.getElementById('dir-name').innerText = `/${path}`;
        document.getElementById('back-container').innerHTML = path !== '' ? `<div class="back-btn" onclick="goBack()">⬅ Powrót</div>` : '';

        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`);
            allItems = await res.json();
            renderFiles(allItems);
        } catch (err) {
            listDiv.innerHTML = "<div style='padding:20px; color:red'>Błąd połączenia.</div>";
        }
    }

    function renderFiles(items) {
        const listDiv = document.getElementById('file-list');
        listDiv.innerHTML = '';
        const visible = items.filter(i => !['index.html', 'fileexp1.html', 'style.css'].includes(i.name) && !i.name.startsWith('.'));
        
        visible.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            const isDir = item.type === 'dir';
            div.innerHTML = `
                <div class="icon-box">${getIcon(item)}</div>
                <div class="file-info">
                    <span class="file-name">${item.name}</span>
                    <span class="file-meta">${isDir ? 'Folder' : (item.size / 1024).toFixed(1) + ' KB'}</span>
                </div>`;
            div.onclick = () => isDir ? loadDir(item.path) : handleFileClick(item);
            listDiv.appendChild(div);
        });
    }

    function handleFileClick(item) {
        const ext = item.name.split('.').pop().toLowerCase();
        if (['png', 'jpg', 'jpeg', 'gif'].includes(ext)) {
            document.getElementById('preview-img').src = item.download_url;
            document.getElementById('preview').style.display = 'flex';
        } else { window.open(item.download_url, '_blank'); }
    }

    function filterFiles() {
        const query = document.getElementById('search').value.toLowerCase();
        renderFiles(allItems.filter(i => i.name.toLowerCase().includes(query)));
    }

    function goBack() {
        const parts = currentPath.split('/');
        parts.pop();
        loadDir(parts.join('/'));
    }

    loadDir();
</script>
</body>
</html>
