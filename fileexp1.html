<!DOCTYPE html>
<html>
<head>
    <title>Index of /</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #0b0b0d; color: #ccc; }
        h1 { color: #00d4ff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .item { display: flex; justify-content: space-between; padding: 8px; text-decoration: none; color: #00d4ff; border-bottom: 1px solid #1c1c1f; cursor: pointer; }
        .item:hover { background: #1c1c1f; }
        .back { color: #ff4d4d; font-weight: bold; margin-bottom: 15px; display: inline-block; cursor: pointer; }
        .info { color: #666; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1 id="dir-name">Index of /</h1>
    <div id="back-container"></div>
    <div id="file-list">Ładowanie...</div>

    <script>
        const USER = 'serwis6178'; 
        const REPO = 'serwis6178.github.io'; 
        let currentPath = ''; // Ścieżka, w której obecnie jesteśmy

        async function loadDir(path = '') {
            const listDiv = document.getElementById('file-list');
            const backContainer = document.getElementById('back-container');
            const dirName = document.getElementById('dir-name');
            
            listDiv.innerHTML = "Ładowanie...";
            currentPath = path;
            dirName.innerText = `Index of /${path}`;

            // Przyciski powrotu
            backContainer.innerHTML = path !== '' ? `<span class="back" onclick="goBack()">⬅ Powrót</span>` : '';

            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`);
                const items = await response.json();
                listDiv.innerHTML = '';

                items.forEach(item => {
                    // Ukrywamy pliki systemowe
                    if (item.name === 'index.html' || item.name === 'fileexp1.html' || item.name.startsWith('.')) return;

                    const div = document.createElement('div');
                    div.className = 'item';
                    
                    const isDir = item.type === 'dir';
                    const icon = isDir ? '📁' : '📄';
                    
                    div.innerHTML = `
                        <span>${icon} ${item.name}</span>
                        <span class="info">${isDir ? '[Folder]' : (item.size / 1024).toFixed(1) + ' KB'}</span>
                    `;

                    div.onclick = () => {
                        if (isDir) {
                            loadDir(item.path); // Wchodzimy głębiej
                        } else {
                            window.open(item.download_url, '_blank'); // Otwieramy plik
                        }
                    };
                    listDiv.appendChild(div);
                });
            } catch (err) {
                listDiv.innerHTML = "<span style='color:red'>Błąd ładowania folderu.</span>";
            }
        }

        function goBack() {
            const parts = currentPath.split('/');
            parts.pop(); // Usuwamy ostatni folder ze ścieżki
            loadDir(parts.join('/'));
        }

        loadDir(); // Start
    </script>
</body>
</html>
