<!DOCTYPE html>
<html>
<head>
    <title>Index of /files</title>
    <style>
        body { font-family: monospace; padding: 20px; line-height: 1.5; }
        .file-link { display: block; text-decoration: none; color: blue; }
        .file-link:hover { background: #eee; }
        hr { border: 0; border-top: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Index of /files (Generated via API)</h1>
    <hr>
    <div id="file-list">Ładowanie plików...</div>
    <hr>

    <script>
        const USER = 'dlpagenet'; // TWÓJ LOGIN
        const REPO = 'dlpagenet.github.io'; // NAZWA REPOZYTORIUM
        
        async function getFiles() {
            const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
            const data = await response.json();
            const listDiv = document.getElementById('file-list');
            listDiv.innerHTML = '';

            data.forEach(file => {
                // Nie pokazujemy plików systemowych i html
                if(file.name.endsWith('.html') || file.name.startsWith('.')) return;

                const link = document.createElement('a');
                link.href = file.download_url;
                link.className = 'file-link';
                link.innerHTML = `📄 ${file.name.padEnd(30)} ${file.size} bytes`;
                listDiv.appendChild(link);
            });
        }

        getFiles();
    </script>
</body>
</html>
