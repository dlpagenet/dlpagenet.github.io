<!DOCTYPE html>
<html lang="pl">
<head>

        .article-container { max-width: 800px; margin: 50px auto; padding: 20px; }

        .back-home-btn { display: inline-block; margin-top: 30px; padding: 10px 25px; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; border-radius: 8px; font-weight: bold; }
        .back-home-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>
    <div class="article-container">
        <article class="article-card">

                </div>
